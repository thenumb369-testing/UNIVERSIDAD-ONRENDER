<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Gestión de Cursos - Universidad</title>
    <style>
        body { background-color: #fcfcfc; font-family: sans-serif; }
        .navbar { background-color: #212529; }
        .card { border-radius: 8px; border: 1px solid #eee; }
        .btn-guardar { background-color: #198754; color: white; border: none; padding: 10px; border-radius: 5px; }
        .btn-info { background-color: #0dcaf0; border: none; color: white; }
        .btn-danger { background-color: #dc3545; border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">UNIVERSIDAD</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#">Home</a>
                <a class="nav-link" href="#">Contacto</a>
                <a class="nav-link" href="#">Registrate</a>
                <a class="nav-link" href="#">Iniciar Sesion</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-sm-12 col-md-4 col-lg-4 col-xl-4">
                <h3 class="fw-normal mb-3">Gestion de Cursos</h3>
                <div class="card p-4 shadow-sm bg-white">
                    <form action="/registrarCurso/" method="POST"> {% csrf_token %}
                        <div class="mb-3">
                            <input type="text" name="txtCodigo" class="form-control" placeholder="Codigo" required>
                        </div>
                        <div class="mb-3">
                            <input type="text" name="txtNombre" class="form-control" placeholder="Nombre" required>
                        </div>
                        <div class="mb-3">
                            <input type="number" name="numCreditos" class="form-control" placeholder="Créditos" required>
                        </div>
                        <button type="submit" class="btn btn-guardar w-100">Guardar</button>
                    </form>
                </div>
            </div>

            <div class="col-sm-12 col-md-8 col-lg-8 col-xl-8">
                <h3 class="fw-normal mb-3">Listado de Cursos</h3>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>CODIGO</th>
                                <th>NOMBRE</th>
                                <th>CREDITOS</th>
                                <th colspan="2">OPCIONES</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for c in cursos %}
                            <tr>
                                <td>{{ forloop.counter }}</td>
                                <td>{{ c.codigo }}</td>
                                <td>{{ c.nombre }}</td>
                                <td>{{ c.creditos }}</td>
                                <td><a href="edicionCurso/{{c.codigo}}" class="btn btn-info btn-sm text-white">Editar</a></td>
                                <td><a href="eliminacionCurso/{{c.codigo}}" class="btn btn-danger btn-sm">Eliminar</a></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
