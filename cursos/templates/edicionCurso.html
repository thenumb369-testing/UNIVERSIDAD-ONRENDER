<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Edición de Curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fcfcfc; }
        .card { border-radius: 10px; border: none; }
        .navbar { background-color: #212529; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand">UNIVERSIDAD - PANEL DE EDICIÓN</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <h3 class="fw-normal mb-3 text-center">Edición de Curso</h3>
                <div class="card p-4 shadow-sm border">
                    <form action="/editarCurso/" method="POST"> 
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label text-muted small">Código (No editable)</label>
                            <input type="text" name="txtCodigo" value="{{curso.codigo}}" class="form-control bg-light" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nombre del Curso</label>
                            <input type="text" name="txtNombre" value="{{curso.nombre}}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Créditos</label>
                            <input type="number" name="numCreditos" value="{{curso.creditos}}" class="form-control" required>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-success w-100">Actualizar Datos</button>
                            <a href="/" class="btn btn-secondary w-100 mt-2">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
